<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }
        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }
        nav a:hover {
            color: yellow;
        }
        .hero {
            padding: 60px;
            text-align: center;
            background: #f4f4f4;
        }
        .container {
            padding: 20px;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>Welcome to My Website</h1>
        <p>Built by Sahil 🚀</p>
    </header>

    <!-- Navbar -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Hello Boss 👑</h2>
        <p>This is your awesome website landing page.</p>
        <button onclick="alert('Welcome Sahil!')">Click Me</button>
    </section>

    <!-- Content -->
    <div class="container">
        <h2>About Us</h2>
        <p>This is a simple responsive website template you can customize.</p>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website | All Rights Reserved</p>
    </footer>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
